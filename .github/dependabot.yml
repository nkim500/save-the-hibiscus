version: 2
# Security-only mode.
#
# open-pull-requests-limit: 0 disables routine "a newer version exists" PRs,
# while leaving Dependabot SECURITY updates (CVE fixes) and alerts fully active.
# So PRs now appear ONLY when a dependency has a known vulnerability — never for
# routine version bumps.
updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 0

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 0
