# IAP authorization extension in DRY_RUN — evaluates access decisions and LOGS
# them, but does not actually block. Lets us see the governance mechanics safely.
name: hibiscus-iap-authz
service: iap.googleapis.com
failOpen: true
timeout: 1s
metadata:
  iamEnforcementMode: "DRY_RUN"
  iapPolicyVersion: "V1"
